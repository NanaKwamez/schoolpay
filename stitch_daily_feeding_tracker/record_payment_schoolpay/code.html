<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Record Payment</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#edeeef",
                        "inverse-primary": "#95d4b3",
                        "secondary-fixed": "#ffddb9",
                        "tertiary": "#00478a",
                        "on-surface": "#191c1d",
                        "surface-variant": "#e1e3e4",
                        "on-tertiary-fixed": "#001b3c",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#d5e3ff",
                        "on-background": "#191c1d",
                        "surface-dim": "#d9dadb",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#a7c8ff",
                        "secondary-container": "#fea520",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#ffb961",
                        "surface-bright": "#f8f9fa",
                        "primary-fixed-dim": "#95d4b3",
                        "primary-fixed": "#b1f0ce",
                        "on-tertiary-fixed-variant": "#004689",
                        "secondary": "#865300",
                        "on-tertiary": "#ffffff",
                        "outline": "#707973",
                        "primary-container": "#2d6a4f",
                        "primary": "#0f5238",
                        "outline-variant": "#bfc9c1",
                        "surface-tint": "#2c694e",
                        "background": "#f8f9fa",
                        "tertiary-container": "#235fa8",
                        "surface-container-low": "#f3f4f5",
                        "surface": "#f8f9fa",
                        "on-surface-variant": "#404943",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#694000",
                        "on-primary-fixed": "#002114",
                        "surface-container-high": "#e7e8e9",
                        "on-secondary-fixed-variant": "#663e00",
                        "surface-container-highest": "#e1e3e4",
                        "inverse-surface": "#2e3132",
                        "on-primary-container": "#a8e7c5",
                        "on-primary-fixed-variant": "#0e5138",
                        "inverse-on-surface": "#f0f1f2",
                        "on-secondary-fixed": "#2b1700",
                        "on-tertiary-container": "#c7daff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem",
                        "3xl": "1.5rem"
                    },
                    "spacing": {
                        "touch-target-min": "60px",
                        "margin-mobile": "20px",
                        "gutter": "16px",
                        "base-unit": "8px",
                        "margin-tablet": "32px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-xl": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .liquid-glass {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }
        .liquid-glass-input {
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .liquid-glass-input:focus-within {
            border-color: #0f5238; /* primary */
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 12px rgba(15, 82, 56, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col font-body-md overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full h-[60px] flex items-center justify-between px-4 z-50 bg-[#2D6A4F] dark:bg-emerald-900 border-b border-white/10 shadow-sm docked full-width top-0">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center text-white/80 hover:bg-white/10 rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-inter font-bold text-lg tracking-tight text-white">Record Payment</h1>
<button aria-label="View history" class="w-10 h-10 flex items-center justify-center text-white/80 hover:bg-white/10 rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">history</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto px-margin-mobile pt-[80px] pb-[100px] flex flex-col gap-base-unit">
<!-- Search Field -->
<div class="relative w-full h-[56px] liquid-glass-input rounded-2xl flex items-center px-4 transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant mr-3">search</span>
<input class="w-full h-full bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant/60 font-body-md outline-none" placeholder="Search student name..." type="text" value="Kofi Annan"/>
</div>
<!-- Selected Student Card -->
<div class="liquid-glass rounded-[24px] p-5 mt-2 flex items-center gap-4 relative overflow-hidden">
<div class="absolute top-0 right-0 w-24 h-24 bg-primary/5 rounded-bl-full -z-10"></div>
<div class="w-14 h-14 rounded-full bg-tertiary-container/20 flex items-center justify-center border border-tertiary-container/30 shrink-0">
<span class="material-symbols-outlined text-tertiary-container text-[28px]" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div class="flex-1">
<p class="font-label-sm text-on-surface-variant uppercase tracking-wider mb-1">Selected Student</p>
<h2 class="font-headline-md text-on-surface">Kofi Annan</h2>
<div class="flex items-center gap-2 mt-1">
<span class="inline-flex items-center px-2 py-0.5 rounded-full bg-secondary-container/20 text-secondary border border-secondary-container/30 font-label-sm">
                        Class: JHS 2
                    </span>
</div>
</div>
</div>
<!-- Fee Type Selector -->
<div class="mt-4">
<label class="font-label-lg text-on-surface-variant block mb-2 px-1">Fee Type</label>
<div class="relative w-full h-[60px] liquid-glass-input rounded-2xl flex items-center px-4 transition-all duration-300">
<span class="material-symbols-outlined text-primary mr-3">receipt_long</span>
<select class="w-full h-full bg-transparent border-none focus:ring-0 text-on-surface font-body-md appearance-none outline-none cursor-pointer pr-8">
<option value="feeding">Feeding Fee</option>
<option value="bece">BECE Registration</option>
<option value="pta">PTA Levy</option>
</select>
<span class="material-symbols-outlined text-on-surface-variant absolute right-4 pointer-events-none">arrow_drop_down</span>
</div>
</div>
<!-- Amount Input -->
<div class="mt-4">
<label class="font-label-lg text-on-surface-variant block mb-2 px-1">Amount Received (GHS)</label>
<div class="relative w-full h-[72px] liquid-glass-input rounded-2xl flex items-center px-4 transition-all duration-300 border-2 border-transparent focus-within:border-primary">
<span class="font-headline-md text-on-surface-variant mr-3 font-medium">GHS</span>
<input class="w-full h-full bg-transparent border-none focus:ring-0 font-headline-xl text-primary outline-none py-0" placeholder="0.00" type="number" value="45.00"/>
</div>
</div>
<!-- Payment Type Toggles -->
<div class="mt-4">
<label class="font-label-lg text-on-surface-variant block mb-2 px-1">Payment Type</label>
<div class="grid grid-cols-1 gap-3">
<!-- Inactive Toggle -->
<button class="h-[60px] w-full rounded-2xl border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md font-medium flex items-center justify-between px-5 transition-all active:scale-[0.98]">
<span>Full Payment</span>
<span class="material-symbols-outlined text-outline-variant">radio_button_unchecked</span>
</button>
<!-- Active Toggle -->
<button class="h-[60px] w-full rounded-2xl border-2 border-primary bg-primary-container/10 text-primary font-body-md font-medium flex items-center justify-between px-5 transition-all shadow-[0_4px_12px_rgba(45,106,79,0.1)] relative overflow-hidden">
<div class="absolute inset-0 bg-white/40 backdrop-blur-sm -z-10"></div>
<span>Part Payment</span>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
</button>
<!-- Inactive Toggle -->
<button class="h-[60px] w-full rounded-2xl border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md font-medium flex items-center justify-between px-5 transition-all active:scale-[0.98]">
<span>Weekly Advance</span>
<span class="material-symbols-outlined text-outline-variant">radio_button_unchecked</span>
</button>
</div>
</div>
<!-- Danger/Warning Box -->
<div class="mt-2 bg-error-container/50 border border-error/20 rounded-xl p-4 flex items-start gap-3 backdrop-blur-md">
<span class="material-symbols-outlined text-error mt-0.5" style="font-variation-settings: 'FILL' 1;">error</span>
<div>
<p class="font-label-lg text-error-container-on font-semibold text-[#93000a]">Balance remaining: GHS 32.00</p>
<p class="font-label-sm text-[#ba1a1a]/80 mt-1">This student has outstanding arrears for this fee type.</p>
</div>
</div>
<!-- Notes Input -->
<div class="mt-4">
<label class="font-label-lg text-on-surface-variant block mb-2 px-1">Notes (Optional)</label>
<div class="w-full liquid-glass-input rounded-2xl p-4 transition-all duration-300 min-h-[100px]">
<textarea class="w-full h-full bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant/60 font-body-md outline-none resize-none min-h-[80px]" placeholder="Add any details about this payment..."></textarea>
</div>
</div>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-xl border-t border-surface-variant z-40 pb-safe pb-8">
<div class="max-w-md mx-auto">
<button class="w-full h-[60px] rounded-full bg-primary text-on-primary font-label-lg font-bold shadow-[0_8px_24px_rgba(15,82,56,0.3)] flex items-center justify-center gap-2 active:scale-95 transition-all duration-200 hover:bg-surface-tint">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                Save Payment
            </button>
</div>
</div>
</body></html>
