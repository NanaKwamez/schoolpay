<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Feeding Payment Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

        tailwind.config = {

            extend: {
              "colors": {
                      "secondary-fixed": "#ffddb9",
                      "inverse-primary": "#95d4b3",
                      "surface-container": "#edeeef",
                      "surface-variant": "#e1e3e4",
                      "on-tertiary-fixed": "#001b3c",
                      "on-secondary": "#ffffff",
                      "tertiary": "#00478a",
                      "on-surface": "#191c1d",
                      "on-primary": "#ffffff",
                      "tertiary-fixed": "#d5e3ff",
                      "on-background": "#191c1d",
                      "error": "#ba1a1a",
                      "surface-dim": "#d9dadb",
                      "tertiary-fixed-dim": "#a7c8ff",
                      "on-error": "#ffffff",
                      "secondary-fixed-dim": "#ffb961",

                      "surface-bright": "#f8f9fa",
                      "primary-fixed-dim": "#95d4b3",
                      "on-tertiary-fixed-variant": "#004689",
                      "primary-fixed": "#b1f0ce",
                      "outline": "#707973",
                      "primary-container": "#2d6a4f",
                      "secondary": "#865300",
                      "on-tertiary": "#ffffff",
                      "primary": "#0f5238",
                      "outline-variant": "#bfc9c1",
                      "surface-tint": "#2c694e",
                      "tertiary-container": "#235fa8",
                      "surface-container-low": "#f3f4f5",

                      "on-error-container": "#93000a",

                      "inverse-surface": "#2e3132",
                      "on-primary-container": "#a8e7c5",
                      "surface-container-high": "#e7e8e9",
                      "on-secondary-fixed-variant": "#663e00",

              },
              "borderRadius": {

              },
              "spacing": {
                      "margin-tablet": "32px",
                      "margin-mobile": "20px",
                      "gutter": "16px",
                      "base-unit": "8px",
                      "touch-target-min": "60px"
              },
              "fontFamily": {
                      "label-lg": ["Inter"],
                      "headline-lg": ["Inter"],
                      "label-sm": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-md": ["Inter"],

                      "body-md": ["Inter"]
              },
              "fontSize": {

          }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .liquid-glass {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }
        body {
            /* Subtle gradient to enhance glass effect */
            background: linear-gradient(135deg, #f8f9fa 0%, #e1e3e4 100%);
            min-height: 100vh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background font-body-md text-body-md relative overflow-x-hidden antialiased pb-32">
<!-- TopAppBar (Shared Component styling applied verbatim as requested) -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md fixed top-0 w-full z-50 border-b border-white/20 shadow-[0_4px_30px_rgba(0,0,0,0.04)] flex items-center justify-between px-5 h-16 transition-colors">
<button aria-label="Go Back" class="text-emerald-800 dark:text-emerald-400 hover:bg-emerald-50/50 dark:hover:bg-emerald-900/30 transition-colors active:scale-95 duration-200 h-10 w-10 flex items-center justify-center rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-sans antialiased text-emerald-900 dark:text-emerald-50 font-semibold text-xl">Feeding Tracker</h1>
<div class="w-10"></div> <!-- Spacer to center headline -->
</header>
<main class="pt-24 px-margin-mobile md:px-margin-tablet max-w-3xl mx-auto flex flex-col gap-gutter">
<!-- Context Header & Status -->
<div class="flex flex-col gap-base-unit mb-2">
<h2 class="font-headline-md text-headline-md text-on-surface">Mark Feeding — JHS 2</h2>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
                Monday, Oct 24
            </p>
<div class="mt-2 self-start liquid-glass px-4 py-2 rounded-full flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="font-label-lg text-label-lg text-primary">32 marked, 8 remaining</span>
</div>
</div>
<!-- Student List Container -->
<div class="flex flex-col gap-base-unit">
<!-- Student Row 1 (Active PAID) -->
<article class="liquid-glass rounded-xl p-gutter flex flex-col gap-gutter">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="font-headline-lg text-body-lg text-on-surface font-semibold">Kwame Mensah</span>
</div>
<!-- Badges -->
<div class="flex flex-wrap gap-2 justify-end">
<span class="bg-error-container text-on-error-container font-label-sm text-label-sm px-3 py-1 rounded-full whitespace-nowrap">OWES GHS 3</span>
</div>
</div>
<!-- Action Buttons (Min 60px touch target) -->
<div class="grid grid-cols-4 gap-2 h-[touch-target-min]">
<button class="bg-primary text-on-primary rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95 shadow-sm">
                        PAID
                    </button>
<button class="bg-transparent border-2 border-outline-variant text-on-surface-variant rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95">
                        CREDIT
                    </button>
<button class="bg-transparent border-2 border-outline-variant text-on-surface-variant rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95">
                        ABSENT
                    </button>
<button class="bg-transparent border-2 border-outline-variant text-on-surface-variant rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95">
                        NO EAT
                    </button>
</div>
</article>
<!-- Student Row 2 (Active CREDIT) -->
<article class="liquid-glass rounded-xl p-gutter flex flex-col gap-gutter">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="font-headline-lg text-body-lg text-on-surface font-semibold">Ama Serwaa</span>
</div>
<!-- Badges -->
<div class="flex flex-wrap gap-2 justify-end">
<span class="bg-primary-container text-on-primary-container font-label-sm text-label-sm px-3 py-1 rounded-full whitespace-nowrap">WEEKLY</span>
</div>
</div>
<!-- Action Buttons -->
<div class="grid grid-cols-4 gap-2 h-[touch-target-min]">
<button class="bg-transparent border-2 border-outline-variant text-on-surface-variant rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95">
                        PAID
                    </button>
<button class="bg-secondary-container text-on-secondary-container rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95 shadow-sm">
                        CREDIT
                    </button>
<button class="bg-transparent border-2 border-outline-variant text-on-surface-variant rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95">
                        ABSENT
                    </button>
<button class="bg-transparent border-2 border-outline-variant text-on-surface-variant rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95">
                        NO EAT
                    </button>
</div>
</article>
<!-- Student Row 3 (Untouched) -->
<article class="liquid-glass rounded-xl p-gutter flex flex-col gap-gutter border-l-4 border-l-primary-fixed">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="font-headline-lg text-body-lg text-on-surface font-semibold">Kofi Annan</span>
</div>
</div>
<!-- Action Buttons -->
<div class="grid grid-cols-4 gap-2 h-[touch-target-min]">
<button class="bg-transparent border-2 border-outline-variant text-on-surface-variant rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95">
                        PAID
                    </button>
<button class="bg-transparent border-2 border-outline-variant text-on-surface-variant rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95">
                        CREDIT
                    </button>
<button class="bg-transparent border-2 border-outline-variant text-on-surface-variant rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95">
                        ABSENT
                    </button>
<button class="bg-transparent border-2 border-outline-variant text-on-surface-variant rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95">
                        NO EAT
                    </button>
</div>
</article>
</div>
</main>
<!-- Bottom Action Area (Fixed) -->
<!-- Suppressed BottomNavBar due to explicit transactional intent. Replaced with primary action container. -->
<div class="fixed bottom-0 left-0 w-full bg-white/85 backdrop-blur-xl border-t border-white/50 p-margin-mobile flex justify-center z-40 shadow-[0_-8px_32px_rgba(0,0,0,0.06)]">
<div class="max-w-3xl w-full">
<button class="w-full h-[touch-target-min] bg-primary text-on-primary rounded-full font-label-lg text-label-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/20 transition-transform active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
                Submit to Admin
            </button>
</div>
</div>
</body></html>
