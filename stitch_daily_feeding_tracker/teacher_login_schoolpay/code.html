<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>SchoolPay - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#235fa8",
                        "on-primary-fixed-variant": "#0e5138",
                        "on-background": "#191c1d",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-high": "#e7e8e9",
                        "error": "#ba1a1a",
                        "background": "#f8f9fa",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#404943",
                        "secondary-fixed-dim": "#ffb961",
                        "on-surface": "#191c1d",
                        "tertiary": "#00478a",
                        "surface-bright": "#f8f9fa",
                        "outline-variant": "#bfc9c1",
                        "on-secondary-fixed-variant": "#663e00",
                        "surface-tint": "#2c694e",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#b1f0ce",
                        "surface-container-low": "#f3f4f5",
                        "surface-dim": "#d9dadb",
                        "on-tertiary-fixed-variant": "#004689",
                        "on-primary": "#ffffff",
                        "primary": "#0f5238",
                        "on-primary-fixed": "#002114",
                        "on-secondary": "#ffffff",
                        "primary-container": "#2d6a4f",
                        "outline": "#707973",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-variant": "#e1e3e4",
                        "on-tertiary-fixed": "#001b3c",
                        "surface": "#f8f9fa",
                        "secondary-container": "#fea520",
                        "on-secondary-container": "#694000",
                        "tertiary-fixed": "#d5e3ff",
                        "on-tertiary-container": "#c7daff",
                        "on-secondary-fixed": "#2b1700",
                        "inverse-primary": "#95d4b3",
                        "on-primary-container": "#a8e7c5",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#ffddb9",
                        "secondary": "#865300",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#2e3132",
                        "surface-container": "#edeeef",
                        "primary-fixed-dim": "#95d4b3",
                        "tertiary-fixed-dim": "#a7c8ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target-min": "60px",
                        "gutter": "16px",
                        "margin-tablet": "32px",
                        "base-unit": "8px",
                        "margin-mobile": "20px"
                    },
                    "fontFamily": {
                        "headline-xl": ["Inter"],
                        "label-sm": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],

                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]

                }
            }
        }
    </script>
<style>
        .glass-card {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.04);
        }
        .glass-input:focus-within {
            border-color: #0f5238; /* Primary Green */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center font-body-md antialiased overflow-hidden px-margin-mobile">
<!-- Decorative Background Elements for Liquid Glass depth -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary-fixed/20 blur-[80px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-tertiary-fixed/20 blur-[100px]"></div>
</div>
<!-- Offline Badge -->
<div class="absolute top-6 right-margin-mobile flex items-center justify-center bg-surface-container-high rounded-full w-10 h-10 shadow-sm border border-outline-variant">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 0;">wifi_off</span>
</div>
<!-- Main Container -->
<main class="w-full max-w-[400px] flex flex-col gap-8">
<!-- Header -->
<header class="flex flex-col items-center text-center gap-4">
<div class="flex items-center gap-2 text-primary-container">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">school</span>
<h1 class="font-headline-lg text-headline-lg text-primary-container">SchoolPay</h1>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface">Welcome, Teacher</h2>
</header>
<!-- Form Container (Glass Card) -->
<div class="glass-card rounded-[24px] p-6 flex flex-col gap-6 w-full relative z-10">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="glass-input relative flex items-center w-full min-h-touch-target-min rounded-xl border border-outline-variant bg-white/60 overflow-hidden transition-all duration-200">
<span class="material-symbols-outlined text-outline absolute left-4" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full h-full pl-12 pr-4 bg-transparent border-none focus:ring-0 text-on-surface font-body-lg text-body-lg placeholder-outline outline-none" id="email" placeholder="teacher@school.edu" type="email"/>
</div>
</div>
<!-- PIN Input -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1">Secure PIN</label>
<div class="flex justify-between gap-2 w-full">
<!-- Pin Box 1 -->
<div class="glass-input relative flex-1 min-h-[72px] aspect-square rounded-xl border border-outline-variant bg-white/60 flex items-center justify-center overflow-hidden transition-all duration-200">
<input class="w-full h-full text-center bg-transparent border-none focus:ring-0 text-on-surface font-headline-xl text-headline-xl outline-none" maxlength="1" placeholder="·" type="password"/>
</div>
<!-- Pin Box 2 -->
<div class="glass-input relative flex-1 min-h-[72px] aspect-square rounded-xl border border-outline-variant bg-white/60 flex items-center justify-center overflow-hidden transition-all duration-200">
<input class="w-full h-full text-center bg-transparent border-none focus:ring-0 text-on-surface font-headline-xl text-headline-xl outline-none" maxlength="1" placeholder="·" type="password"/>
</div>
<!-- Pin Box 3 -->
<div class="glass-input relative flex-1 min-h-[72px] aspect-square rounded-xl border border-outline-variant bg-white/60 flex items-center justify-center overflow-hidden transition-all duration-200">
<input class="w-full h-full text-center bg-transparent border-none focus:ring-0 text-on-surface font-headline-xl text-headline-xl outline-none" maxlength="1" placeholder="·" type="password"/>
</div>
<!-- Pin Box 4 -->
<div class="glass-input relative flex-1 min-h-[72px] aspect-square rounded-xl border border-outline-variant bg-white/60 flex items-center justify-center overflow-hidden transition-all duration-200">
<input class="w-full h-full text-center bg-transparent border-none focus:ring-0 text-on-surface font-headline-xl text-headline-xl outline-none" maxlength="1" placeholder="·" type="password"/>
</div>
</div>
</div>
<!-- Login Button -->
<button class="w-full min-h-touch-target-min bg-primary text-on-primary rounded-xl font-label-lg text-label-lg flex items-center justify-center gap-2 mt-2 shadow-sm hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all duration-200">
<span>Login</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
<!-- Footer -->
<footer class="text-center w-full mt-4">
<p class="font-label-sm text-label-sm text-outline">Contact admin if you forgot your PIN</p>
</footer>
</main>
</body></html>
