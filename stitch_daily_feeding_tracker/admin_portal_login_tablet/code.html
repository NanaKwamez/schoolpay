<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SchoolPay Admin - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-tint": "#2c694e",

                      "surface-container": "#edeeef",
                      "primary-fixed-dim": "#95d4b3",
                      "error-container": "#ffdad6",
                      "on-secondary-fixed": "#2b1700",
                      "on-surface": "#191c1d",
                      "tertiary": "#00478a",
                      "primary": "#0f5238",
                      "inverse-on-surface": "#f0f1f2",
                      "on-primary": "#ffffff",
                      "primary-fixed": "#b1f0ce",
                      "on-tertiary-fixed-variant": "#004689",
                      "on-primary-container": "#a8e7c5",
                      "on-tertiary-fixed": "#001b3c",
                      "tertiary-fixed": "#d5e3ff",
                      "on-error-container": "#93000a",
                      "inverse-surface": "#2e3132",
                      "background": "#f8f9fa",
                      "inverse-primary": "#95d4b3",
                      "on-secondary": "#ffffff",
                      "surface-container-high": "#e7e8e9",
                      "surface-dim": "#d9dadb",
                      "primary-container": "#2d6a4f",
                      "on-tertiary": "#ffffff",
                      "outline-variant": "#bfc9c1",
                      "on-primary-fixed-variant": "#0e5138",
                      "surface-bright": "#f8f9fa",
                      "surface-variant": "#e1e3e4",
                      "on-secondary-fixed-variant": "#663e00",
                      "outline": "#707973",
                      "on-error": "#ffffff",
                      "secondary": "#865300",
                      "on-tertiary-container": "#c7daff",
                      "on-background": "#191c1d",
                      "on-surface-variant": "#404943",
                      "surface": "#f8f9fa",
                      "secondary-container": "#fea520",
                      "surface-container-lowest": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "margin-mobile": "20px",
                      "base-unit": "8px",
                      "margin-tablet": "32px",
                      "touch-target-min": "60px",
                      "gutter": "16px"
              },
              "fontFamily": {
                      "label-sm": [
                              "Inter"
                      ],
                      "headline-md": [
                              "Inter"
                      ],
                      "headline-lg": [
                              "Inter"
                      ],
                      "body-lg": [
                              "Inter"
                      ],
                      "label-lg": [
                              "Inter"
                      ],
                      "headline-xl": [
                              "Inter"
                      ],
                      "body-md": [

                      ]
              },
              "fontSize": {
                      "label-sm": [
                              "12px",

                              }

          },

</head>
<body class="bg-primary-fixed-dim/20 min-h-screen flex items-center justify-center p-margin-tablet">
<!-- Login Card: 'Liquid Glass' Aesthetic -->
<div class="bg-white/80 backdrop-blur-xl border border-white/40 shadow-[0_4px_40px_rgba(0,0,0,0.06)] rounded-[24px] p-margin-tablet w-full max-w-[500px] flex flex-col items-center">
<!-- Header -->
<div class="text-center mb-[40px] flex flex-col items-center">
<!-- Logo Approximation using Material Symbol -->
<div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mb-6 border border-primary/20">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">
                    school
                </span>
</div>
<h1 class="font-headline-xl text-headline-xl text-primary mb-2 tracking-tight">
                SchoolPay
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Admin Portal
            </p>
</div>
<!-- Form -->
<form class="w-full flex flex-col gap-base-unit space-y-4">
<!-- Email Input Group -->
<div class="relative flex flex-col gap-1 w-full">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1" for="email">
                    Email Address
                </label>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">
                        mail
                    </span>
<input class="w-full h-touch-target-min bg-white/50 backdrop-blur-sm border border-outline-variant rounded-xl pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:bg-white/80 transition-all duration-200" id="email" placeholder="admin@schoolpay.edu" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="relative flex flex-col gap-1 w-full">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1" for="password">
                    Password
                </label>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">
                        lock
                    </span>
<input class="w-full h-touch-target-min bg-white/50 backdrop-blur-sm border border-outline-variant rounded-xl pl-12 pr-12 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:bg-white/80 transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">
                            visibility
                        </span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center justify-between w-full px-1 mt-2 mb-6">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20" type="checkbox"/>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">
                    Forgot Password?
                </a>
</div>
<!-- Primary Action -->
<button class="w-full h-touch-target-min bg-primary hover:bg-primary-container text-on-primary font-label-lg text-label-lg rounded-xl shadow-[0_8px_16px_rgba(15,82,56,0.15)] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="button">
<span>Login</span>
<span class="material-symbols-outlined text-xl">
                    arrow_forward
                </span>
</button>
</form>
<!-- Footer Info -->
<div class="mt-8 pt-6 border-t border-surface-variant/50 w-full text-center">
<p class="font-label-sm text-label-sm text-outline">
                Protected by SchoolPay Secure Access.
             </p>
</div>
</div>
</body></html>
